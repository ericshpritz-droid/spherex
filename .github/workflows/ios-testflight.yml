name: iOS TestFlight

on:
  push:
    branches:
      - main
    paths:
      - "src/components/**"
      - "src/hooks/**"
      - "src/lib/**"
      - "src/routes/**"
      - "src/assets/**"
      - "src/router.tsx"
      - "src/styles.css"
      - "src/mutual/AppContext.tsx"
      - "src/mutual/auth.ts"
      - "src/mutual/brand.js"
      - "src/mutual/components/**"
      - "src/mutual/data.js"
      - "src/mutual/native/**"
      - "src/mutual/screens/**"
      - "src/mutual/testmode/**"
      - "public/**"
      - "dist/**"
      - "package.json"
      - "bun.lockb"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "vite.config.ts"
      - "tsconfig.json"
      - "components.json"
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      BUNDLE_ID: app.lovable.sphere
      LOG_DIR: ${{ runner.temp }}/ios-build-logs
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare artifact directories
        run: mkdir -p "$LOG_DIR" "$RUNNER_TEMP/export"

      - name: Verify required secrets
        run: |
          for var in APPLE_TEAM_ID CERTIFICATE_PASSWORD CERTIFICATE_BASE64 PROFILE_BASE64 APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required GitHub secret: $var" >&2
              exit 1
            fi
          done

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Build production web assets
        run: bun run build

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d ios ]; then
            bunx cap add ios
          fi

      - name: Sync Capacitor iOS project
        run: bunx cap sync ios

      - name: Install CocoaPods dependencies
        run: pod install --project-directory=ios/App

      - name: Prepare signing assets
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/appstore.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          AUTH_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"

          security create-keychain -p "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "AUTH_KEY_PATH=$AUTH_KEY_PATH"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Sphere.xcarchive" \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive 2>&1 | tee "$LOG_DIR/archive.log"

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Sphere.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -allowProvisioningUpdates 2>&1 | tee "$LOG_DIR/export.log"

      - name: Upload build to TestFlight
        env:
          IPA_PATH: ${{ runner.temp }}/export/App.ipa
        run: |
          set -o pipefail
          if [ ! -f "$IPA_PATH" ]; then
            echo "Expected IPA not found at: $IPA_PATH" | tee -a "$LOG_DIR/testflight-upload.log"
            echo "Contents of export directory:" | tee -a "$LOG_DIR/testflight-upload.log"
            ls -la "$RUNNER_TEMP/export" | tee -a "$LOG_DIR/testflight-upload.log"
            exit 1
          fi

          rm -f "$LOG_DIR/testflight-upload.log"
          for attempt in 1 2 3; do
            echo "TestFlight upload attempt $attempt" | tee -a "$LOG_DIR/testflight-upload.log"

            if xcrun altool \
              --upload-app \
              --type ios \
              --file "$IPA_PATH" \
              --apiKey "$APP_STORE_CONNECT_KEY_ID" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1 | tee -a "$LOG_DIR/testflight-upload.log"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 30))
              echo "Upload failed, retrying in ${delay}s..." | tee -a "$LOG_DIR/testflight-upload.log"
              sleep "$delay"
            fi
          done

          echo "TestFlight upload failed after 3 attempts." | tee -a "$LOG_DIR/testflight-upload.log"
          exit 1

      - name: Upload iOS debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/ios-build-logs
            ${{ runner.temp }}/export/*.ipa